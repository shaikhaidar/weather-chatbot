services:
  # 1. FastAPI Python Backend Service
  - type: web
    name: weatherbot-backend
    env: python
    buildCommand: pip install -r backend/requirements-render.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
      - key: OLLAMA_MODEL
        value: llama3.2:3b

  # 2. Vite React Static Frontend Service
  - type: web
    name: weatherbot-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    routes:
      # Proxy all API requests from frontend to backend
      - type: rewrite
        source: /api/*
        destination: http://weatherbot-backend/*
      # Support client-side routing for Vite React Router / SPA
      - type: rewrite
        source: /*
        destination: /index.html
